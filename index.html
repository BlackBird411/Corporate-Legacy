<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Underground Empire — Admin Console</title>

<!-- React + ReactDOM (UMD builds, no build step needed) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel lets us write JSX directly in this file and have the browser compile it -->
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

<style>
  /* =========================================================
     UNDERGROUND EMPIRE — instrument panel HUD system
     Palette: graphite / gunmetal grey base, amber-yellow readouts.
     Inspired by the orbital-window/thermal-display reference —
     hairline panel grids, corner brackets, radial gauges, mono
     everywhere — reworked from cyan/white into grey/yellow, and
     laid out for this site's own content, not copied 1:1.
     ========================================================= */
  :root {
    --bg: #0a0a0b;
    --bg-panel: #131315;
    --bg-panel-raised: #191a1c;
    --bg-inset: #0d0d0e;

    --grid-line: rgba(201, 168, 60, 0.06);
    --grid-line-strong: rgba(201, 168, 60, 0.12);

    --border: #2a2a2d;
    --border-soft: #202022;
    --border-hud: rgba(201, 168, 60, 0.35);
    --border-hud-dim: rgba(201, 168, 60, 0.16);

    --text: #e4e3df;
    --text-dim: #8c8b87;
    --text-faint: #55534e;

    --accent: #d9b23c;       /* primary amber-yellow */
    --accent-bright: #f2cc4f;
    --accent-dim: #8a7226;
    --accent-glow: rgba(217, 178, 60, 0.18);

    --danger: #d6584a;
    --danger-dim: #7a2f26;
    --success: #7ec96f;
    --success-dim: #3a5e2f;

    --mono: 'SF Mono', 'JetBrains Mono', Consolas, 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
      radial-gradient(ellipse 70% 45% at 50% -10%, rgba(217, 178, 60, 0.05), transparent);
    background-size: 34px 34px, 34px 34px, 100% 100%;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  button { cursor: pointer; }
  button:disabled { cursor: not-allowed; opacity: 0.5; }
  a { color: var(--accent); }
  :focus-visible { outline: 1px solid var(--accent); outline-offset: 2px; }
  ::selection { background: var(--accent-glow); }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  @keyframes hud-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes hud-scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
  @keyframes hud-fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes hud-sweep { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  /* Corner bracket frame — the recurring HUD motif, applied via a
     pseudo-element pair so it layers over any panel without extra markup. */
  .hud-frame { position: relative; }
  .hud-frame::before, .hud-frame::after {
    content: "";
    position: absolute;
    width: 14px; height: 14px;
    pointer-events: none;
    opacity: 0.85;
  }
  .hud-frame::before {
    top: -1px; left: -1px;
    border-top: 2px solid var(--accent);
    border-left: 2px solid var(--accent);
  }
  .hud-frame::after {
    bottom: -1px; right: -1px;
    border-bottom: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">

// =========================================================
// CONFIG — fill this in before deploying.
// =========================================================
const SUPABASE_URL = "https://ngfkmluzrgbphgowrrul.supabase.co";
const FUNCTION_URL = SUPABASE_URL + "/functions/v1/trigger-admin-action";
const LIST_ACTIONS_URL = SUPABASE_URL + "/functions/v1/list-admin-function";
const ROBLOX_LOOKUP_URL = SUPABASE_URL + "/functions/v1/roblox-lookup";
const PROFILE_LOOKUP_URL = SUPABASE_URL + "/functions/v1/player-profile-lookup";
const INVENTORY_ACTION_URL = SUPABASE_URL + "/functions/v1/admin-inventory-action";

const { useState, useEffect, useCallback, useMemo } = React;
const LOGIN_FUNCTION_URL = SUPABASE_URL + "/functions/v1/admin-login-function";

// =========================================================
// Item database — mirrored from ReplicatedStorage.ItemDatabase
// (read directly via MCP from Studio). Kept as plain data here
// purely for the admin picker UI; the Luau side remains the
// single source of truth for what's actually valid in-game.
// =========================================================
const ITEM_DATABASE = {
  Weapons: [
    "Glock 41", "Glock 41-S", "Stolen Glock", "M9", "Navy Revolver", "RSH-12",
    "GAUGE Pistol", "Handgun", "Desert Eagle",
    "R870", "Pump Shotgun", "Double Barrel Shotgun", "Beanbag Shotgun", "Shotgun",
    "AK-47", "AK-12", "AS VAL", "M4A1", "M4A1-S", "M4A1 Colt", "M16A1", "HK416",
    "G36C", "SIG 552", "SIG MCX", "NARAC 556", "TAR 21", "Troy AR-56",
    "MP5", "MP5SD", "MP7", "P90", "UMP45",
    "M249", "M1A EBR-SM", ".50 cal", "Railgun", "Minigun", "Lewis Gun", "Sten Gun",
    "Type 26", "Luger", "Tommy Gun",
    "Golden Deagle", "Golden Wesson", "Holy Wheellock", "Lefaucheux", "Tranquilizer",
  ],
  Medical: [
    "Bandage", "Acetaminophen", "Antibody", "Antibiotic", "Tube-C",
    "Jet Injector", "Anaesthesia", "Medical Bag", "C-107",
  ],
  Armor: [
    "Light Vest", "Heavy Vest", "Military Vest", "Normal Armor", "Tactical Armor",
    "Fast Helmet", "Heavy Helmet", "Military Helmet", "Riot Helmet",
    "Gas Mask", "MFG Generator", "Sentry_Nightvision",
  ],
  Items: [],
};
const ALL_ITEMS = Object.entries(ITEM_DATABASE).flatMap(([cat, names]) =>
  names.map(name => ({ name, category: cat }))
);

// =========================================================
// Login
// =========================================================
function Login({ onLoginSuccess }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setError(null);
    setLoading(true);
    try {
      const res = await fetch(LOGIN_FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const json = await res.json();
      setLoading(false);
      if (!res.ok || json.error) {
        setError(json.error || "Wrong username or password.");
        return;
      }
      onLoginSuccess(json.token, json.admin);
    } catch (err) {
      setLoading(false);
      setError("Network error reaching the login function. Try again.");
    }
  }

  return (
    <div style={s.wrap}>
      <div style={{ ...s.panel }} className="hud-frame">
        <div style={s.hudTopLabel}>UE-OS · AUTH TERMINAL</div>
        <div style={s.eyebrow}>UNDERGROUND EMPIRE</div>
        <h1 style={s.title}>Admin Console</h1>
        <p style={s.sub}>Sign in with your operator credentials.</p>
        <form onSubmit={handleSubmit} style={s.form}>
          <label style={s.label}>
            Username
            <input type="text" value={username} onChange={e => setUsername(e.target.value)} required autoFocus style={s.input} placeholder="username" autoComplete="username" />
          </label>
          <label style={s.label}>
            Password
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required style={s.input} placeholder="••••••••" autoComplete="current-password" />
          </label>
          {error && <div style={s.errorBox}>{error}</div>}
          <button type="submit" disabled={loading} style={s.primaryButton}>{loading ? "AUTHENTICATING…" : "SIGN IN"}</button>
        </form>
        <p style={s.footnote}>Accounts are provisioned manually by the project owner.</p>
      </div>
    </div>
  );
}

// =========================================================
// Action Form
// =========================================================
const ACTION_TYPES = [
  { value: "set_credits", label: "Set credits to…", field: "value", verb: "Set credits" },
  { value: "add_credits", label: "Add / subtract credits", field: "delta", verb: "Adjust credits" },
  { value: "set_xp", label: "Set XP to…", field: "value", verb: "Set XP" },
  { value: "add_xp", label: "Add XP", field: "delta", verb: "Grant XP" },
];

function ActionForm({ onActionComplete, token, prefillUserId, prefillUsername }) {
  const [robloxUserId, setRobloxUserId] = useState(prefillUserId || "");
  const [robloxUsername, setRobloxUsername] = useState(prefillUsername || "");
  const [actionType, setActionType] = useState("set_credits");
  const [amount, setAmount] = useState("");
  const [reason, setReason] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [result, setResult] = useState(null);
  const [lookingUp, setLookingUp] = useState(false);

  useEffect(() => {
    if (prefillUserId) setRobloxUserId(prefillUserId);
    if (prefillUsername) setRobloxUsername(prefillUsername);
  }, [prefillUserId, prefillUsername]);

  const selectedAction = ACTION_TYPES.find(a => a.value === actionType);

  async function resolveUsername() {
    if (!robloxUsername.trim()) return;
    setLookingUp(true);
    setResult(null);
    try {
      if (!token) {
        setResult({ ok: false, message: "Your session expired — please sign in again." });
        setLookingUp(false);
        return;
      }
      const res = await fetch(ROBLOX_LOOKUP_URL, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ username: robloxUsername.trim() }),
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        setResult({ ok: false, message: data.error || "Lookup failed." });
        return;
      }

      if (data && data.data && data.data.length) {
        setRobloxUserId(String(data.data[0].id));
        setResult({ ok: true, message: `Found: ${data.data[0].name} (UserId ${data.data[0].id})` });
      } else {
        setResult({ ok: false, message: "No Roblox user found with that username." });
      }
    } catch (err) {
      setResult({ ok: false, message: "Lookup failed — Roblox API may be unreachable. You can still enter a UserId directly." });
    } finally {
      setLookingUp(false);
    }
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setResult(null);

    const userId = Number(robloxUserId);
    const amountNum = Number(amount);

    if (!userId || !Number.isFinite(userId)) {
      setResult({ ok: false, message: "Enter a valid numeric Roblox UserId (or look one up by username above)." });
      return;
    }
    if (!Number.isFinite(amountNum)) {
      setResult({ ok: false, message: "Enter a valid number for the amount." });
      return;
    }

    setSubmitting(true);
    try {
      if (!token) {
        setResult({ ok: false, message: "Your session expired — please sign in again." });
        setSubmitting(false);
        return;
      }

      const payload = { [selectedAction.field]: amountNum };

      const res = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          roblox_user_id: userId,
          roblox_username: robloxUsername.trim() || null,
          action_type: actionType,
          payload,
          reason: reason.trim() || null,
        }),
      });

      const json = await res.json();

      if (!res.ok || json.error) {
        setResult({ ok: false, message: json.error || "Action failed for an unknown reason." });
      } else {
        const deliveryNote = json.delivery_method === "live"
          ? "Delivered live — the player will see it within a couple seconds if online."
          : "Player appears offline — queued, will apply on their next join.";
        setResult({ ok: true, message: `${selectedAction.verb} → ${amountNum}. ${deliveryNote}` });
        setAmount("");
        setReason("");
        if (onActionComplete) onActionComplete();
      }
    } catch (err) {
      setResult({ ok: false, message: "Network error reaching the admin function. Check your connection and try again." });
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <form onSubmit={handleSubmit} style={s.form}>
      <div style={s.section}>
        <div style={s.sectionLabel}>Target player</div>
        <div style={s.row}>
          <input type="text" placeholder="Roblox username" value={robloxUsername} onChange={e => setRobloxUsername(e.target.value)} style={{ ...s.input, flex: 1 }} />
          <button type="button" onClick={resolveUsername} disabled={lookingUp || !robloxUsername.trim()} style={s.secondaryButton}>
            {lookingUp ? "…" : "Find UserId"}
          </button>
        </div>
        <input type="text" inputMode="numeric" placeholder="Roblox UserId (numeric)" value={robloxUserId}
          onChange={e => setRobloxUserId(e.target.value.replace(/[^0-9]/g, ""))} required style={s.input} />
      </div>

      <div style={s.section}>
        <div style={s.sectionLabel}>Action</div>
        <select value={actionType} onChange={e => setActionType(e.target.value)} style={s.input}>
          {ACTION_TYPES.map(a => <option key={a.value} value={a.value}>{a.label}</option>)}
        </select>
        <input type="number" placeholder={selectedAction.field === "delta" ? "Amount (use − for subtract)" : "New value"}
          value={amount} onChange={e => setAmount(e.target.value)} required style={s.input} />
        <input type="text" placeholder="Reason (optional, shown in audit log)" value={reason} onChange={e => setReason(e.target.value)} style={s.input} />
      </div>

      {result && <div style={result.ok ? s.resultOk : s.resultError}>{result.message}</div>}

      <button type="submit" disabled={submitting} style={s.primaryButton}>
        {submitting ? "SENDING…" : selectedAction.verb.toUpperCase()}
      </button>
    </form>
  );
}

// =========================================================
// Inventory Action Form — add/remove items
// =========================================================
function InventoryActionForm({ token, prefillUserId, prefillUsername, onActionComplete }) {
  const [robloxUserId, setRobloxUserId] = useState(prefillUserId || "");
  const [robloxUsername, setRobloxUsername] = useState(prefillUsername || "");
  const [mode, setMode] = useState("add_item"); // "add_item" | "remove_item"
  const [category, setCategory] = useState("Weapons");
  const [itemName, setItemName] = useState("");
  const [reason, setReason] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [result, setResult] = useState(null);

  useEffect(() => {
    if (prefillUserId) setRobloxUserId(prefillUserId);
    if (prefillUsername) setRobloxUsername(prefillUsername);
  }, [prefillUserId, prefillUsername]);

  const itemsInCategory = ITEM_DATABASE[category] || [];

  useEffect(() => {
    // Reset selection if category changes and current item isn't in it
    if (!itemsInCategory.includes(itemName)) setItemName(itemsInCategory[0] || "");
  }, [category]); // eslint-disable-line react-hooks/exhaustive-deps

  async function handleSubmit(e) {
    e.preventDefault();
    setResult(null);

    const userId = Number(robloxUserId);
    if (!userId || !Number.isFinite(userId)) {
      setResult({ ok: false, message: "Enter a valid numeric Roblox UserId." });
      return;
    }
    if (!itemName) {
      setResult({ ok: false, message: "Select an item." });
      return;
    }
    if (!token) {
      setResult({ ok: false, message: "Your session expired — please sign in again." });
      return;
    }

    setSubmitting(true);
    try {
      const res = await fetch(INVENTORY_ACTION_URL, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          roblox_user_id: userId,
          roblox_username: robloxUsername.trim() || null,
          action_type: mode,
          payload: { itemName, category },
          reason: reason.trim() || null,
        }),
      });
      const json = await res.json();

      if (!res.ok || json.error) {
        setResult({ ok: false, message: json.error || "Action failed for an unknown reason." });
      } else {
        const deliveryNote = json.delivery_method === "live"
          ? "Broadcast sent live."
          : "Player offline — queued for next join.";
        setResult({
          ok: true,
          message: `${mode === "add_item" ? "Grant" : "Removal"} of "${itemName}" logged. ${deliveryNote}`,
        });
        setReason("");
        if (onActionComplete) onActionComplete();
      }
    } catch (err) {
      setResult({ ok: false, message: "Network error reaching the inventory function." });
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <form onSubmit={handleSubmit} style={s.form}>
      <div style={s.section}>
        <div style={s.sectionLabel}>Target player</div>
        <div style={s.row}>
          <input type="text" placeholder="Roblox username (optional label)" value={robloxUsername} onChange={e => setRobloxUsername(e.target.value)} style={{ ...s.input, flex: 1 }} />
        </div>
        <input type="text" inputMode="numeric" placeholder="Roblox UserId (numeric)" value={robloxUserId}
          onChange={e => setRobloxUserId(e.target.value.replace(/[^0-9]/g, ""))} required style={s.input} />
      </div>

      <div style={s.section}>
        <div style={s.sectionLabel}>Operation</div>
        <div style={s.segmentRow}>
          <button type="button" onClick={() => setMode("add_item")}
            style={mode === "add_item" ? s.segmentActive : s.segment}>Add item</button>
          <button type="button" onClick={() => setMode("remove_item")}
            style={mode === "remove_item" ? s.segmentActiveDanger : s.segment}>Remove item</button>
        </div>
      </div>

      <div style={s.section}>
        <div style={s.sectionLabel}>Item</div>
        <select value={category} onChange={e => setCategory(e.target.value)} style={s.input}>
          {Object.keys(ITEM_DATABASE).map(cat => (
            <option key={cat} value={cat}>{cat} ({ITEM_DATABASE[cat].length})</option>
          ))}
        </select>
        <select value={itemName} onChange={e => setItemName(e.target.value)} style={s.input} disabled={itemsInCategory.length === 0}>
          {itemsInCategory.length === 0 && <option value="">No catalogued items in this category</option>}
          {itemsInCategory.map(name => <option key={name} value={name}>{name}</option>)}
        </select>
        <input type="text" placeholder="Reason (optional, shown in audit log)" value={reason} onChange={e => setReason(e.target.value)} style={s.input} />
      </div>

      {result && <div style={result.ok ? s.resultOk : s.resultError}>{result.message}</div>}

      <div style={s.noteBox}>
        Inventory admin actions are logged and broadcast immediately, same as
        credits/XP — but applying add/remove into the live game still needs
        the Luau-side handlers wired up before it takes effect in-game.
      </div>

      <button type="submit" disabled={submitting || !itemName} style={mode === "remove_item" ? s.primaryButtonDanger : s.primaryButton}>
        {submitting ? "SENDING…" : (mode === "add_item" ? "GRANT ITEM" : "REMOVE ITEM")}
      </button>
    </form>
  );
}

// =========================================================
// Action History
// =========================================================
const STATUS_STYLES = {
  pending: { color: "var(--accent)", label: "PENDING" },
  broadcast: { color: "var(--accent)", label: "SENT" },
  applied: { color: "var(--success)", label: "APPLIED" },
  failed: { color: "var(--danger)", label: "FAILED" },
};
const ACTION_LABELS = {
  set_credits: "Set credits",
  add_credits: "Adjust credits",
  set_xp: "Set XP",
  add_xp: "Grant XP",
  add_item: "Grant item",
  remove_item: "Remove item",
};

function ActionHistory({ refreshSignal, token }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch(LIST_ACTIONS_URL, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const json = await res.json();
      if (!res.ok || json.error) {
        setError(json.error || "Failed to load history.");
      } else {
        setRows(json.actions || []);
        setError(null);
      }
    } catch (err) {
      setError("Network error loading history.");
    }
    setLoading(false);
  }, [token]);

  useEffect(() => { if (token) load(); }, [load, refreshSignal, token]);

  function formatAmount(row) {
    const p = row.payload || {};
    if (p.value !== undefined) return `→ ${p.value}`;
    if (p.delta !== undefined) return `${p.delta > 0 ? "+" : ""}${p.delta}`;
    if (p.itemName !== undefined) return p.itemName;
    return "—";
  }

  return (
    <div style={s.col}>
      <div style={s.headerRow}>
        <div style={s.sectionLabel}>Recent actions</div>
        <button onClick={load} style={s.secondaryButton} disabled={loading}>{loading ? "…" : "Refresh"}</button>
      </div>

      {error && <div style={s.errorBox}>Couldn't load history: {error}</div>}
      {!error && rows.length === 0 && !loading && <div style={s.empty}>No actions yet. Submit one above and it'll show up here.</div>}

      <div style={s.table}>
        {rows.map(row => {
          const status = STATUS_STYLES[row.status] || STATUS_STYLES.pending;
          return (
            <div key={row.id} style={s.tableRow}>
              <div style={s.rowMain}>
                <span style={s.player}>{row.roblox_username || `UserId ${row.roblox_user_id}`}</span>
                <span style={s.actionLabel}>{ACTION_LABELS[row.action_type] || row.action_type}</span>
                <span style={s.amount}>{formatAmount(row)}</span>
              </div>
              <div style={s.rowMeta}>
                <span style={{ ...s.status, color: status.color }}>{status.label}</span>
                {row.delivery_method && <span style={s.delivery}>{row.delivery_method}</span>}
                <span style={s.time}>{new Date(row.created_at).toLocaleString()}</span>
              </div>
              {row.reason && <div style={s.reason}>{row.reason}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// =========================================================
// Personnel Database — profile lookup
// =========================================================
function avatarHeadshotUrl(userId) {
  return `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=420&height=420&format=png`;
}

function formatDuration(totalSeconds) {
  if (totalSeconds === null || totalSeconds === undefined) return "—";
  const sTotal = Math.max(0, Math.floor(totalSeconds));
  const h = Math.floor(sTotal / 3600);
  const m = Math.floor((sTotal % 3600) / 60);
  const sec = sTotal % 60;
  return `${h}H ${m}M ${sec}S`;
}

function formatJoinDate(unixSeconds) {
  if (!unixSeconds) return "UNKNOWN";
  const d = new Date(unixSeconds * 1000);
  return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "2-digit" }) +
    " · " + d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
}

function daysAgo(unixSeconds) {
  if (!unixSeconds) return null;
  const diffMs = Date.now() - unixSeconds * 1000;
  const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  if (days <= 0) return "today";
  if (days === 1) return "1 day ago";
  return `${days} days ago`;
}

function PersonnelDatabase({ token, onEditPlayer, onEditInventory }) {
  const [query, setQuery] = useState("");
  const [lookingUp, setLookingUp] = useState(false);
  const [error, setError] = useState(null);
  const [profile, setProfile] = useState(null);
  const [resolvedUsername, setResolvedUsername] = useState(null);

  async function handleLookup(e) {
    e.preventDefault();
    setError(null);
    setProfile(null);
    if (!query.trim()) return;

    setLookingUp(true);
    try {
      if (!token) {
        setError("Your session expired — please sign in again.");
        setLookingUp(false);
        return;
      }

      let userId = query.trim();
      let usernameForDisplay = null;

      if (!/^\d+$/.test(userId)) {
        const lookupRes = await fetch(ROBLOX_LOOKUP_URL, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ username: userId }),
        });
        const lookupJson = await lookupRes.json();
        if (!lookupRes.ok || lookupJson.error || !lookupJson.data?.length) {
          setError(lookupJson.error || "No Roblox user found with that username.");
          setLookingUp(false);
          return;
        }
        userId = String(lookupJson.data[0].id);
        usernameForDisplay = lookupJson.data[0].name;
      }

      const res = await fetch(PROFILE_LOOKUP_URL, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ roblox_user_id: Number(userId) }),
      });
      const json = await res.json();

      if (!res.ok || json.error) {
        setError(json.error || "Lookup failed.");
        setLookingUp(false);
        return;
      }

      setResolvedUsername(usernameForDisplay);
      setProfile(json);
    } catch (err) {
      setError("Network error reaching the profile lookup function.");
    } finally {
      setLookingUp(false);
    }
  }

  return (
    <div style={pd.wrap}>
      <form onSubmit={handleLookup} style={pd.searchRow}>
        <input
          type="text"
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="QUERY: USERID OR USERNAME"
          style={{ ...s.input, flex: 1, fontFamily: "var(--mono)", letterSpacing: "0.02em" }}
        />
        <button type="submit" disabled={lookingUp || !query.trim()} style={s.primaryButton}>
          {lookingUp ? "QUERYING…" : "QUERY DATABASE"}
        </button>
      </form>

      {error && <div style={s.errorBox}>{error}</div>}

      {!profile && !error && !lookingUp && (
        <div style={pd.emptyState} className="hud-frame">
          <div style={pd.emptyStateIcon}>◈</div>
          <div>Enter a Roblox UserId or username to pull a personnel record.</div>
          <div style={pd.emptyStateSub}>Records are read live from ProfileStore — works for offline players too.</div>
        </div>
      )}

      {profile && (
        <ProfileDossier
          profile={profile}
          username={resolvedUsername}
          onEdit={() => onEditPlayer({ userId: String(profile.roblox_user_id), username: resolvedUsername || "" })}
          onEditInventory={() => onEditInventory({ userId: String(profile.roblox_user_id), username: resolvedUsername || "" })}
        />
      )}
    </div>
  );
}

          {!found && (
            <div style={pd.notFoundBox}>

          {found && (
            <React.Fragment>
              <div style={pd.hairline}></div>
              <div style={pd.statGrid}>
                <div style={pd.statCell}>
                  <div style={pd.statLabel}>First joined</div>
                  <div style={pd.statValue}>{formatJoinDate(profile.first_joined)}</div>
                  {profile.first_joined && <div style={pd.statSub}>{daysAgo(profile.first_joined)}</div>}
                </div>
                <div style={pd.statCell}>
                  <div style={pd.statLabel}>Total playtime</div>
                  <div style={pd.statValue}>{formatDuration(profile.total_time_seconds)}</div>
                </div>
                <div style={pd.statCell}>
                  <div style={pd.statLabel}>XP / Total XP</div>
                  <div style={pd.statValue}>{profile.xp ?? "—"} / {profile.total_xp ?? "—"}</div>
                </div>
                <div style={pd.statCell}>
                  <div style={pd.statLabel}>Skill points</div>
                  <div style={pd.statValue}>{profile.skill_points ?? "—"}</div>
                </div>
                <div style={pd.statCell}>
                  <div style={pd.statLabel}>Bank</div>
                  <div style={pd.statValue}>
                    {profile.bank !== null && profile.bank !== undefined
                      ? Number(profile.bank).toLocaleString() + " ₵"
                      : "—"}
                  </div>
                </div>
                <div style={pd.statCell}>
                  <div style={pd.statLabel}>Stock portfolio</div>
                  <div style={pd.statValue}>
                    {profile.stock_portfolio
                      ? (Array.isArray(profile.stock_portfolio) ? `${profile.stock_portfolio.length} holdings` : "on file")
                      : "—"}
                  </div>
                </div>
              </div>
            </React.Fragment>
          )}
        </div>
      </div>

      {found && (
        <React.Fragment>
          <div style={pd.sectionDivider}>INVENTORY</div>
          <div style={pd.inventoryWrap}>
            {INVENTORY_CATEGORIES.map(cat => (
              <InventoryCategory
                key={cat.key}
                label={cat.label}
                items={profile.inventory ? profile.inventory[cat.key] : []}
              />
            ))}
          </div>

          <div style={pd.sectionDivider}>ADMIN INTERACTION LOG</div>
          <div style={pd.historyWrap}>
            {(!profile.admin_actions || profile.admin_actions.length === 0) && (
              <div style={pd.invEmpty}>No prior admin actions on file for this player.</div>
            )}
            {profile.admin_actions && profile.admin_actions.map(row => {
              const status = STATUS_STYLES[row.status] || STATUS_STYLES.pending;
              const p = row.payload || {};
              const amount = p.value !== undefined ? `→ ${p.value}`
                : (p.delta !== undefined ? `${p.delta > 0 ? "+" : ""}${p.delta}`
                : (p.itemName !== undefined ? p.itemName : "—"));
              return (
                <div key={row.id} style={pd.historyRow}>
                  <span style={{ ...pd.historyDot, background: status.color }}></span>
                  <span style={pd.historyAction}>{ACTION_LABELS[row.action_type] || row.action_type}</span>
                  <span style={pd.historyAmount}>{amount}</span>
                  <span style={pd.historyTime}>{new Date(row.created_at).toLocaleString()}</span>
                  {row.reason && <span style={pd.historyReason}>{row.reason}</span>}
                </div>
              );
            })}
          </div>

          <div style={pd.dossierFooter}>
            <button type="button" onClick={onEditInventory} style={s.secondaryButton}>Edit inventory →</button>
            <button type="button" onClick={onEdit} style={s.primaryButton}>Edit credits/XP →</button>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

function App() {
  const [token, setToken] = useState(() => sessionStorage.getItem("admin_token") || null);
  const [adminInfo, setAdminInfo] = useState(() => {
    const raw = sessionStorage.getItem("admin_info");
    return raw ? JSON.parse(raw) : null;
  });
  const [refreshSignal, setRefreshSignal] = useState(0);
  const [activeTab, setActiveTab] = useState("actions"); // "actions" | "inventory" | "personnel"
  const [prefill, setPrefill] = useState({ userId: "", username: "" });

  const handleLoginSuccess = useCallback((newToken, admin) => {
    sessionStorage.setItem("admin_token", newToken);
    sessionStorage.setItem("admin_info", JSON.stringify(admin));
    setToken(newToken);
    setAdminInfo(admin);
  }, []);

  const handleSignOut = useCallback(() => {
    sessionStorage.removeItem("admin_token");
    sessionStorage.removeItem("admin_info");
    setToken(null);
    setAdminInfo(null);
  }, []);

  const handleEditFromProfile = useCallback(({ userId, username }) => {
    setPrefill({ userId, username });
    setActiveTab("actions");
  }, []);

  const handleEditInventoryFromProfile = useCallback(({ userId, username }) => {
    setPrefill({ userId, username });
    setActiveTab("inventory");
  }, []);

  if (!token || !adminInfo) return <Login onLoginSuccess={handleLoginSuccess} />;

  return (
    <div style={s.page}>
      <header style={s.pageHeader}>
        <div>
          <div style={s.hudTopLabel}>UE-OS ALPHA BUILD 1.4.2</div>
          <div style={s.eyebrow}>UNDERGROUND EMPIRE</div>
          <h1 style={s.pageTitle}>Admin Console</h1>
        </div>
        <div style={s.headerRight}>
          <span style={s.whoami}>{adminInfo.username} · {adminInfo.role}</span>
          <button onClick={handleSignOut} style={s.secondaryButton}>Sign out</button>
        </div>
      </header>

      <nav style={s.tabRow}>
        <button onClick={() => setActiveTab("actions")} style={activeTab === "actions" ? s.tabActive : s.tab}>Actions</button>
        <button onClick={() => setActiveTab("inventory")} style={activeTab === "inventory" ? s.tabActive : s.tab}>Inventory</button>
        <button onClick={() => setActiveTab("personnel")} style={activeTab === "personnel" ? s.tabActive : s.tab}>Personnel Database</button>
      </nav>

      {activeTab === "actions" && (
        <main style={s.main}>
          <section style={s.panelBox} className="hud-frame">
            <h2 style={s.panelTitle}>Edit player data</h2>
            <ActionForm
              token={token}
              onActionComplete={() => setRefreshSignal(n => n + 1)}
              prefillUserId={prefill.userId}
              prefillUsername={prefill.username}
            />
          </section>
          <section style={s.panelBox} className="hud-frame">
            <ActionHistory token={token} refreshSignal={refreshSignal} />
          </section>
        </main>
      )}

      {activeTab === "inventory" && (
        <main style={s.main}>
          <section style={s.panelBox} className="hud-frame">
            <h2 style={s.panelTitle}>Grant / remove items</h2>
            <InventoryActionForm
              token={token}
              onActionComplete={() => setRefreshSignal(n => n + 1)}
              prefillUserId={prefill.userId}
              prefillUsername={prefill.username}
            />
          </section>
          <section style={s.panelBox} className="hud-frame">
            <ActionHistory token={token} refreshSignal={refreshSignal} />
          </section>
        </main>
      )}

      {activeTab === "personnel" && (
        <main style={{ ...s.main, maxWidth: 780, margin: "0 auto", width: "100%" }}>
          <PersonnelDatabase token={token} onEditPlayer={handleEditFromProfile} onEditInventory={handleEditInventoryFromProfile} />
        </main>
      )}
    </div>
  );
}

  inventoryWrap: { display: "flex", flexDirection: "column", gap: 8, padding: "0 20px 20px" },
  invCategory: { border: "1px solid var(--border-soft)", borderRadius: 3, overflow: "hidden" },
  invCategoryHeader: { width: "100%", display: "flex", alignItems: "center", gap: 10, background: "rgba(255,255,255,0.015)", border: "none", padding: "10px 12px", color: "var(--text)", textAlign: "left" },
  invCategoryLabel: { fontSize: 12.5, fontWeight: 600, flex: 1, fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: "0.02em" },

  invChevron: { color: "var(--text-faint)", fontSize: 14, transition: "transform 0.15s ease" },
  invGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 6, padding: "10px 12px" },
  invItem: { fontSize: 12, fontFamily: "var(--mono)", color: "var(--text-dim)", background: "var(--bg-inset)", border: "1px solid var(--border-soft)", borderRadius: 3, padding: "6px 8px" },
  invEmpty: { fontSize: 12, color: "var(--text-faint)", padding: "12px", fontStyle: "italic" },

  historyDot: { width: 6, height: 6, borderRadius: "50%", flexShrink: 0 },
  historyAction: { color: "var(--text)", fontWeight: 600 },
  historyAmount: { fontFamily: "var(--mono)", color: "var(--accent)" },
  historyTime: { color: "var(--text-faint)", fontSize: 11, marginLeft: "auto", fontFamily: "var(--mono)" },
  historyReason: { color: "var(--text-dim)", fontStyle: "italic", width: "100%", fontSize: 11.5 },

  dossierFooter: { padding: "4px 20px 22px", display: "flex", justifyContent: "flex-end", gap: 10 },

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
