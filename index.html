<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Underground Empire — Admin Console</title>

<!-- React + ReactDOM (UMD builds, no build step needed) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel lets us write JSX directly in this file and have the browser compile it -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Supabase JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
  :root {
    --bg: #0b0d10;
    --bg-panel: #14171b;
    --bg-panel-raised: #191d22;
    --border: #262b31;
    --border-soft: #1d2126;
    --text: #e8e9eb;
    --text-dim: #8b929c;
    --text-faint: #565d66;
    --accent: #c9a876;
    --accent-dim: #8a7452;
    --danger: #d64545;
    --danger-dim: #7a2c2c;
    --success: #4fae6e;
    --success-dim: #2c5e3e;
    --mono: 'SF Mono', Consolas, 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201, 168, 118, 0.06), transparent);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  button { cursor: pointer; }
  button:disabled { cursor: not-allowed; opacity: 0.5; }
  a { color: var(--accent); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">

// =========================================================
// CONFIG — fill these in before deploying.
// =========================================================
const SUPABASE_URL = "https://ngfkmluzrgbphgowrrul.supabase.co";
const SUPABASE_ANON_KEY = "REPLACE_WITH_YOUR_ANON_KEY"; // Project Settings → API → anon/public key
const FUNCTION_URL = SUPABASE_URL + "/functions/v1/trigger-admin-action";

const { useState, useEffect, useCallback } = React;
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =========================================================
// Login
// =========================================================
function Login() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setError(null);
    setLoading(true);
    const { error: authError } = await supabase.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (authError) {
      setError(authError.message === "Invalid login credentials" ? "Wrong email or password." : authError.message);
    }
  }

  return (
    <div style={s.wrap}>
      <div style={s.panel}>
        <div style={s.eyebrow}>UNDERGROUND EMPIRE</div>
        <h1 style={s.title}>Admin Console</h1>
        <p style={s.sub}>Sign in with your operator credentials.</p>
        <form onSubmit={handleSubmit} style={s.form}>
          <label style={s.label}>
            Email
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} required autoFocus style={s.input} placeholder="you@example.com" />
          </label>
          <label style={s.label}>
            Password
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required style={s.input} placeholder="••••••••" />
          </label>
          {error && <div style={s.errorBox}>{error}</div>}
          <button type="submit" disabled={loading} style={s.primaryButton}>{loading ? "Signing in…" : "Sign in"}</button>
        </form>
        <p style={s.footnote}>Accounts are provisioned manually in Supabase. Contact the project owner for access.</p>
      </div>
    </div>
  );
}

// =========================================================
// Action Form
// =========================================================
const ACTION_TYPES = [
  { value: "set_credits", label: "Set credits to…", field: "value", verb: "Set credits" },
  { value: "add_credits", label: "Add / subtract credits", field: "delta", verb: "Adjust credits" },
  { value: "set_xp", label: "Set XP to…", field: "value", verb: "Set XP" },
  { value: "add_xp", label: "Add XP", field: "delta", verb: "Grant XP" },
];

function ActionForm({ onActionComplete }) {
  const [robloxUserId, setRobloxUserId] = useState("");
  const [robloxUsername, setRobloxUsername] = useState("");
  const [actionType, setActionType] = useState("set_credits");
  const [amount, setAmount] = useState("");
  const [reason, setReason] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [result, setResult] = useState(null);
  const [lookingUp, setLookingUp] = useState(false);

  const selectedAction = ACTION_TYPES.find(a => a.value === actionType);

  async function resolveUsername() {
    if (!robloxUsername.trim()) return;
    setLookingUp(true);
    setResult(null);
    try {
      const res = await fetch("https://users.roblox.com/v1/usernames/users", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usernames: [robloxUsername.trim()], excludeBannedUsers: false }),
      });
      const data = await res.json();
      if (data && data.data && data.data.length) {
        setRobloxUserId(String(data.data[0].id));
        setResult({ ok: true, message: `Found: ${data.data[0].name} (UserId ${data.data[0].id})` });
      } else {
        setResult({ ok: false, message: "No Roblox user found with that username." });
      }
    } catch (err) {
      setResult({ ok: false, message: "Lookup failed — Roblox API may be unreachable. You can still enter a UserId directly." });
    } finally {
      setLookingUp(false);
    }
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setResult(null);

    const userId = Number(robloxUserId);
    const amountNum = Number(amount);

    if (!userId || !Number.isFinite(userId)) {
      setResult({ ok: false, message: "Enter a valid numeric Roblox UserId (or look one up by username above)." });
      return;
    }
    if (!Number.isFinite(amountNum)) {
      setResult({ ok: false, message: "Enter a valid number for the amount." });
      return;
    }

    setSubmitting(true);
    try {
      const { data: sessionData } = await supabase.auth.getSession();
      const token = sessionData && sessionData.session && sessionData.session.access_token;
      if (!token) {
        setResult({ ok: false, message: "Your session expired — please sign in again." });
        setSubmitting(false);
        return;
      }

      const payload = { [selectedAction.field]: amountNum };

      const res = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          roblox_user_id: userId,
          roblox_username: robloxUsername.trim() || null,
          action_type: actionType,
          payload,
          reason: reason.trim() || null,
        }),
      });

      const json = await res.json();

      if (!res.ok || json.error) {
        setResult({ ok: false, message: json.error || "Action failed for an unknown reason." });
      } else {
        const deliveryNote = json.delivery_method === "live"
          ? "Delivered live — the player will see it within a couple seconds if online."
          : "Player appears offline — queued, will apply on their next join.";
        setResult({ ok: true, message: `${selectedAction.verb} → ${amountNum}. ${deliveryNote}` });
        setAmount("");
        setReason("");
        if (onActionComplete) onActionComplete();
      }
    } catch (err) {
      setResult({ ok: false, message: "Network error reaching the admin function. Check your connection and try again." });
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <form onSubmit={handleSubmit} style={s.form}>
      <div style={s.section}>
        <div style={s.sectionLabel}>Target player</div>
        <div style={s.row}>
          <input type="text" placeholder="Roblox username" value={robloxUsername} onChange={e => setRobloxUsername(e.target.value)} style={{ ...s.input, flex: 1 }} />
          <button type="button" onClick={resolveUsername} disabled={lookingUp || !robloxUsername.trim()} style={s.secondaryButton}>
            {lookingUp ? "Looking up…" : "Find UserId"}
          </button>
        </div>
        <input type="text" inputMode="numeric" placeholder="Roblox UserId (numeric)" value={robloxUserId}
          onChange={e => setRobloxUserId(e.target.value.replace(/[^0-9]/g, ""))} required style={s.input} />
      </div>

      <div style={s.section}>
        <div style={s.sectionLabel}>Action</div>
        <select value={actionType} onChange={e => setActionType(e.target.value)} style={s.input}>
          {ACTION_TYPES.map(a => <option key={a.value} value={a.value}>{a.label}</option>)}
        </select>
        <input type="number" placeholder={selectedAction.field === "delta" ? "Amount (use − for subtract)" : "New value"}
          value={amount} onChange={e => setAmount(e.target.value)} required style={s.input} />
        <input type="text" placeholder="Reason (optional, shown in audit log)" value={reason} onChange={e => setReason(e.target.value)} style={s.input} />
      </div>

      {result && <div style={result.ok ? s.resultOk : s.resultError}>{result.message}</div>}

      <button type="submit" disabled={submitting} style={s.primaryButton}>
        {submitting ? "Sending…" : selectedAction.verb}
      </button>
    </form>
  );
}

// =========================================================
// Action History
// =========================================================
const STATUS_STYLES = {
  pending: { color: "#c9a876", label: "PENDING" },
  broadcast: { color: "#c9a876", label: "SENT" },
  applied: { color: "#4fae6e", label: "APPLIED" },
  failed: { color: "#d64545", label: "FAILED" },
};
const ACTION_LABELS = {
  set_credits: "Set credits",
  add_credits: "Adjust credits",
  set_xp: "Set XP",
  add_xp: "Grant XP",
};

function ActionHistory({ refreshSignal }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const { data, error: fetchError } = await supabase
      .from("admin_actions")
      .select("id, roblox_user_id, roblox_username, action_type, payload, reason, status, delivery_method, created_at")
      .order("created_at", { ascending: false })
      .limit(30);

    if (fetchError) { setError(fetchError.message); }
    else { setRows(data || []); setError(null); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load, refreshSignal]);

  function formatAmount(row) {
    const p = row.payload || {};
    if (p.value !== undefined) return `→ ${p.value}`;
    if (p.delta !== undefined) return `${p.delta > 0 ? "+" : ""}${p.delta}`;
    return "—";
  }

  return (
    <div style={s.col}>
      <div style={s.headerRow}>
        <div style={s.sectionLabel}>Recent actions</div>
        <button onClick={load} style={s.secondaryButton} disabled={loading}>{loading ? "Loading…" : "Refresh"}</button>
      </div>

      {error && <div style={s.errorBox}>Couldn't load history: {error}</div>}
      {!error && rows.length === 0 && !loading && <div style={s.empty}>No actions yet. Submit one above and it'll show up here.</div>}

      <div style={s.table}>
        {rows.map(row => {
          const status = STATUS_STYLES[row.status] || STATUS_STYLES.pending;
          return (
            <div key={row.id} style={s.tableRow}>
              <div style={s.rowMain}>
                <span style={s.player}>{row.roblox_username || `UserId ${row.roblox_user_id}`}</span>
                <span style={s.actionLabel}>{ACTION_LABELS[row.action_type] || row.action_type}</span>
                <span style={s.amount}>{formatAmount(row)}</span>
              </div>
              <div style={s.rowMeta}>
                <span style={{ ...s.status, color: status.color }}>{status.label}</span>
                {row.delivery_method && <span style={s.delivery}>{row.delivery_method}</span>}
                <span style={s.time}>{new Date(row.created_at).toLocaleString()}</span>
              </div>
              {row.reason && <div style={s.reason}>{row.reason}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// =========================================================
// App shell — auth + admin allowlist gate
// =========================================================
function App() {
  const [session, setSession] = useState(undefined);
  const [adminRow, setAdminRow] = useState(undefined);
  const [refreshSignal, setRefreshSignal] = useState(0);

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: listener } = supabase.auth.onAuthStateChange((_e, newSession) => setSession(newSession));
    return () => listener.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) { setAdminRow(session === null ? null : undefined); return; }
    let cancelled = false;
    supabase.from("admins").select("id, username, role").eq("auth_user_id", session.user.id).single()
      .then(({ data, error }) => { if (!cancelled) setAdminRow(error ? null : data); });
    return () => { cancelled = true; };
  }, [session]);

  const handleSignOut = useCallback(() => { supabase.auth.signOut(); }, []);

  if (session === undefined) return <Centered text="Loading…" />;
  if (!session) return <Login />;
  if (adminRow === undefined) return <Centered text="Checking access…" />;
  if (adminRow === null) return <Centered text="Your account isn't provisioned as an admin. Ask the project owner to add you in Supabase." showSignOut onSignOut={handleSignOut} />;

  return (
    <div style={s.page}>
      <header style={s.pageHeader}>
        <div>
          <div style={s.eyebrow}>UNDERGROUND EMPIRE</div>
          <h1 style={s.pageTitle}>Admin Console</h1>
        </div>
        <div style={s.headerRight}>
          <span style={s.whoami}>{adminRow.username} · {adminRow.role}</span>
          <button onClick={handleSignOut} style={s.secondaryButton}>Sign out</button>
        </div>
      </header>
      <main style={s.main}>
        <section style={s.panelBox}>
          <h2 style={s.panelTitle}>Edit player data</h2>
          <ActionForm onActionComplete={() => setRefreshSignal(n => n + 1)} />
        </section>
        <section style={s.panelBox}>
          <ActionHistory refreshSignal={refreshSignal} />
        </section>
      </main>
    </div>
  );
}

function Centered({ text, showSignOut, onSignOut }) {
  return (
    <div style={s.centeredWrap}>
      <p style={s.centeredText}>{text}</p>
      {showSignOut && <button onClick={onSignOut} style={s.secondaryButton}>Sign out</button>}
    </div>
  );
}

// =========================================================
// Styles (plain JS objects — no CSS build step needed)
// =========================================================
const s = {
  wrap: { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 },
  panel: { width: "100%", maxWidth: 380, background: "var(--bg-panel)", border: "1px solid var(--border)", borderRadius: 10, padding: "32px 28px" },
  eyebrow: { fontFamily: "var(--mono)", fontSize: 11, letterSpacing: "0.12em", color: "var(--accent)", marginBottom: 8 },
  title: { fontSize: 22, fontWeight: 600, margin: "0 0 6px 0" },
  sub: { color: "var(--text-dim)", fontSize: 13, margin: "0 0 24px 0" },
  form: { display: "flex", flexDirection: "column", gap: 16 },
  label: { display: "flex", flexDirection: "column", gap: 6, fontSize: 12, color: "var(--text-dim)" },
  input: { background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 6, padding: "10px 12px", color: "var(--text)", width: "100%" },
  errorBox: { background: "rgba(214, 69, 69, 0.1)", border: "1px solid var(--danger-dim)", color: "#e88", borderRadius: 6, padding: "8px 12px", fontSize: 13 },
  primaryButton: { background: "var(--accent)", color: "#1a1408", border: "none", borderRadius: 6, padding: "11px 16px", fontWeight: 600, fontSize: 14 },
  footnote: { marginTop: 24, fontSize: 11, color: "var(--text-faint)", textAlign: "center" },
  section: { display: "flex", flexDirection: "column", gap: 8 },
  sectionLabel: { fontFamily: "var(--mono)", fontSize: 11, letterSpacing: "0.08em", color: "var(--text-faint)", textTransform: "uppercase" },
  row: { display: "flex", gap: 8 },
  secondaryButton: { background: "var(--bg-panel-raised)", border: "1px solid var(--border)", borderRadius: 6, padding: "0 14px", color: "var(--text-dim)", fontSize: 13, whiteSpace: "nowrap", height: 38 },
  resultOk: { background: "rgba(79, 174, 110, 0.1)", border: "1px solid var(--success-dim)", color: "#8fd6a5", borderRadius: 6, padding: "10px 12px", fontSize: 13 },
  resultError: { background: "rgba(214, 69, 69, 0.1)", border: "1px solid var(--danger-dim)", color: "#e88", borderRadius: 6, padding: "10px 12px", fontSize: 13 },
  col: { display: "flex", flexDirection: "column", gap: 12 },
  headerRow: { display: "flex", justifyContent: "space-between", alignItems: "center" },
  empty: { color: "var(--text-faint)", fontSize: 13, padding: "24px 0", textAlign: "center" },
  table: { display: "flex", flexDirection: "column", gap: 1, background: "var(--border-soft)", borderRadius: 8, overflow: "hidden" },
  tableRow: { background: "var(--bg-panel)", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 4 },
  rowMain: { display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" },
  player: { fontWeight: 600, fontSize: 13.5 },
  actionLabel: { color: "var(--text-dim)", fontSize: 13 },
  amount: { fontFamily: "var(--mono)", fontSize: 13, color: "var(--accent)", marginLeft: "auto" },
  rowMeta: { display: "flex", gap: 10, alignItems: "center" },
  status: { fontFamily: "var(--mono)", fontSize: 10.5, letterSpacing: "0.06em", fontWeight: 700 },
  delivery: { fontFamily: "var(--mono)", fontSize: 10.5, color: "var(--text-faint)", border: "1px solid var(--border)", borderRadius: 4, padding: "1px 6px" },
  time: { fontSize: 11.5, color: "var(--text-faint)", marginLeft: "auto" },
  reason: { fontSize: 12.5, color: "var(--text-dim)", fontStyle: "italic" },
  page: { maxWidth: 640, margin: "0 auto", padding: "32px 20px 60px" },
  pageHeader: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 32 },
  pageTitle: { fontSize: 20, fontWeight: 600, margin: 0 },
  headerRight: { display: "flex", alignItems: "center", gap: 12 },
  whoami: { fontSize: 12.5, color: "var(--text-dim)" },
  main: { display: "flex", flexDirection: "column", gap: 24 },
  panelBox: { background: "var(--bg-panel)", border: "1px solid var(--border)", borderRadius: 10, padding: 24 },
  panelTitle: { fontSize: 15, fontWeight: 600, margin: "0 0 20px 0" },
  centeredWrap: { minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, padding: 24, textAlign: "center" },
  centeredText: { color: "var(--text-dim)", maxWidth: 360 },
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
