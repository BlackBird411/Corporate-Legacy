<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Underground Empire — Admin Console</title>

<!-- React + ReactDOM (UMD builds, no build step needed) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel lets us write JSX directly in this file and have the browser compile it -->
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* =========================================================
     UNDERGROUND EMPIRE — sudo-terminal admin console
     Gold / near-black, sidebar-nav, monospace-first.
     Adapted from a "sudo" system-dashboard reference: sidebar
     nav, top vitals strip, bordered panels with command-style
     title bars, log-tail history feed — rebuilt in gold/black
     with gradient washes instead of the reference's green/cyan,
     and every panel repurposed around real admin content.
     ========================================================= */
  :root {
    --bg: #0a0908;
    --bg-panel: #121110;
    --bg-panel-raised: #171512;
    --bg-inset: #0d0c0a;
    --bg-sidebar: #0c0b09;

    --border: #262019;
    --border-soft: #1c1812;
    --border-gold: rgba(212, 175, 55, 0.35);
    --border-gold-dim: rgba(212, 175, 55, 0.14);

    --text: #e9e4d6;
    --text-dim: #94897a;
    --text-faint: #514b3d;

    --gold: #d4af37;
    --gold-bright: #f0cc5c;
    --gold-dim: #8a6f22;
    --gold-glow: rgba(212, 175, 55, 0.16);

    --danger: #d6584a;
    --danger-dim: #6e2c22;
    --success: #7ec96f;
    --success-dim: #34521f;

    --mono: 'JetBrains Mono', 'Space Mono', 'SF Mono', Consolas, monospace;
    --mono-display: 'Space Mono', 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 60% 40% at 15% 0%, rgba(212, 175, 55, 0.05), transparent),
      radial-gradient(ellipse 50% 35% at 100% 100%, rgba(212, 175, 55, 0.03), transparent);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  button { cursor: pointer; }
  button:disabled { cursor: not-allowed; opacity: 0.5; }
  a { color: var(--gold); }
  :focus-visible { outline: 1px solid var(--gold); outline-offset: 2px; }
  ::selection { background: var(--gold-glow); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-inset); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bar-fill { from { width: 0; } }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">

// =========================================================
// CONFIG
// =========================================================
const SUPABASE_URL = "https://ngfkmluzrgbphgowrrul.supabase.co";
const FUNCTION_URL = SUPABASE_URL + "/functions/v1/trigger-admin-action";
const LIST_ACTIONS_URL = SUPABASE_URL + "/functions/v1/list-admin-function";
const ROBLOX_LOOKUP_URL = SUPABASE_URL + "/functions/v1/roblox-lookup";
const PROFILE_LOOKUP_URL = SUPABASE_URL + "/functions/v1/player-profile-lookup";
const INVENTORY_ACTION_URL = SUPABASE_URL + "/functions/v1/admin-inventory-action";
const LOGIN_FUNCTION_URL = SUPABASE_URL + "/functions/v1/admin-login-function";

const { useState, useEffect, useCallback, useMemo, useRef } = React;

// =========================================================
// Item database — mirrored from ReplicatedStorage.ItemDatabase
// =========================================================
const ITEM_DATABASE = {
  Weapons: [
    "Glock 41", "Glock 41-S", "Stolen Glock", "M9", "Navy Revolver", "RSH-12",
    "GAUGE Pistol", "Handgun", "Desert Eagle",
    "R870", "Pump Shotgun", "Double Barrel Shotgun", "Beanbag Shotgun", "Shotgun",
    "AK-47", "AK-12", "AS VAL", "M4A1", "M4A1-S", "M4A1 Colt", "M16A1", "HK416",
    "G36C", "SIG 552", "SIG MCX", "NARAC 556", "TAR 21", "Troy AR-56",
    "MP5", "MP5SD", "MP7", "P90", "UMP45",
    "M249", "M1A EBR-SM", ".50 cal", "Railgun", "Minigun", "Lewis Gun", "Sten Gun",
    "Type 26", "Luger", "Tommy Gun",
    "Golden Deagle", "Golden Wesson", "Holy Wheellock", "Lefaucheux", "Tranquilizer",
  ],
  Medical: [
    "Bandage", "Acetaminophen", "Antibody", "Antibiotic", "Tube-C",
    "Jet Injector", "Anaesthesia", "Medical Bag", "C-107",
  ],
  Armor: [
    "Light Vest", "Heavy Vest", "Military Vest", "Normal Armor", "Tactical Armor",
    "Fast Helmet", "Heavy Helmet", "Military Helmet", "Riot Helmet",
    "Gas Mask", "MFG Generator", "Sentry_Nightvision",
  ],
  Items: [],
};

// =========================================================
// Live clock — signature element, ticks in the top strip
// =========================================================
function useClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  return now;
}
function formatClock(d) {
  const day = d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "2-digit" });
  const time = d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
  return `${day} ${time}`;
}

// =========================================================
// Login
// =========================================================
function Login({ onLoginSuccess }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setError(null);
    setLoading(true);
    try {
      const res = await fetch(LOGIN_FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const json = await res.json();
      setLoading(false);
      if (!res.ok || json.error) {
        setError(json.error || "Wrong username or password.");
        return;
      }
      onLoginSuccess(json.token, json.admin);
    } catch (err) {
      setLoading(false);
      setError("Network error reaching the login function. Try again.");
    }
  }

  return (
    <div style={s.loginWrap}>
      <div style={s.loginPanel}>
        <div style={s.loginBar}>
          <span style={s.loginBarDots}>
            <span style={{ ...s.dot, background: "#4a4234" }}></span>
            <span style={{ ...s.dot, background: "#4a4234" }}></span>
            <span style={{ ...s.dot, background: "var(--gold-dim)" }}></span>
          </span>
          <span style={s.loginBarLabel}>auth — login.sh</span>
        </div>
        <div style={s.loginBody}>
          <div style={s.brandRow}>
            <span style={s.brandGlyph}>▍</span>
            <span style={s.brandName}>sudo-ue</span>
            <span style={s.brandVersion}>v1.4.2</span>
          </div>
          <div style={s.loginPrompt}>$ ./authenticate --operator</div>
          <form onSubmit={handleSubmit} style={s.form}>
            <label style={s.label}>
              username
              <input type="text" value={username} onChange={e => setUsername(e.target.value)} required autoFocus style={s.input} placeholder="operator id" autoComplete="username" />
            </label>
            <label style={s.label}>
              password
              <input type="password" value={password} onChange={e => setPassword(e.target.value)} required style={s.input} placeholder="••••••••" autoComplete="current-password" />
            </label>
            {error && <div style={s.errorBox}>✕ {error}</div>}
            <button type="submit" disabled={loading} style={s.primaryButton}>{loading ? "AUTHENTICATING…" : "SIGN IN →"}</button>
          </form>
          <p style={s.footnote}>Accounts are provisioned manually by the project owner.</p>
        </div>
      </div>
    </div>
  );
}

// =========================================================
// Action Form
// =========================================================
const ACTION_TYPES = [
  { value: "set_credits", label: "Set credits to…", field: "value", verb: "Set credits" },
  { value: "add_credits", label: "Add / subtract credits", field: "delta", verb: "Adjust credits" },
  { value: "set_xp", label: "Set XP to…", field: "value", verb: "Set XP" },
  { value: "add_xp", label: "Add XP", field: "delta", verb: "Grant XP" },
];

function ActionForm({ onActionComplete, token, prefillUserId, prefillUsername }) {
  const [robloxUserId, setRobloxUserId] = useState(prefillUserId || "");
  const [robloxUsername, setRobloxUsername] = useState(prefillUsername || "");
  const [actionType, setActionType] = useState("set_credits");
  const [amount, setAmount] = useState("");
  const [reason, setReason] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [result, setResult] = useState(null);
  const [lookingUp, setLookingUp] = useState(false);

  useEffect(() => {
    if (prefillUserId) setRobloxUserId(prefillUserId);
    if (prefillUsername) setRobloxUsername(prefillUsername);
  }, [prefillUserId, prefillUsername]);

  const selectedAction = ACTION_TYPES.find(a => a.value === actionType);

  async function resolveUsername() {
    if (!robloxUsername.trim()) return;
    setLookingUp(true);
    setResult(null);
    try {
      if (!token) {
        setResult({ ok: false, message: "Your session expired — please sign in again." });
        setLookingUp(false);
        return;
      }
      const res = await fetch(ROBLOX_LOOKUP_URL, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ username: robloxUsername.trim() }),
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        setResult({ ok: false, message: data.error || "Lookup failed." });
        return;
      }

      if (data && data.data && data.data.length) {
        setRobloxUserId(String(data.data[0].id));
        setResult({ ok: true, message: `Found: ${data.data[0].name} (UserId ${data.data[0].id})` });
      } else {
        setResult({ ok: false, message: "No Roblox user found with that username." });
      }
    } catch (err) {
      setResult({ ok: false, message: "Lookup failed — Roblox API may be unreachable. You can still enter a UserId directly." });
    } finally {
      setLookingUp(false);
    }
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setResult(null);

    const userId = Number(robloxUserId);
    const amountNum = Number(amount);

    if (!userId || !Number.isFinite(userId)) {
      setResult({ ok: false, message: "Enter a valid numeric Roblox UserId (or look one up by username above)." });
      return;
    }
    if (!Number.isFinite(amountNum)) {
      setResult({ ok: false, message: "Enter a valid number for the amount." });
      return;
    }

    setSubmitting(true);
    try {
      if (!token) {
        setResult({ ok: false, message: "Your session expired — please sign in again." });
        setSubmitting(false);
        return;
      }

      const payload = { [selectedAction.field]: amountNum };

      const res = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          roblox_user_id: userId,
          roblox_username: robloxUsername.trim() || null,
          action_type: actionType,
          payload,
          reason: reason.trim() || null,
        }),
      });

      const json = await res.json();

      if (!res.ok || json.error) {
        setResult({ ok: false, message: json.error || "Action failed for an unknown reason." });
      } else {
        const deliveryNote = json.delivery_method === "live"
          ? "Delivered live — the player will see it within a couple seconds if online."
          : "Player appears offline — queued, will apply on their next join.";
        setResult({ ok: true, message: `${selectedAction.verb} → ${amountNum}. ${deliveryNote}` });
        setAmount("");
        setReason("");
        if (onActionComplete) onActionComplete();
      }
    } catch (err) {
      setResult({ ok: false, message: "Network error reaching the admin function. Check your connection and try again." });
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <form onSubmit={handleSubmit} style={s.form}>
      <div style={s.section}>
        <div style={s.sectionLabel}>--target</div>
        <div style={s.row}>
          <input type="text" placeholder="roblox username" value={robloxUsername} onChange={e => setRobloxUsername(e.target.value)} style={{ ...s.input, flex: 1 }} />
          <button type="button" onClick={resolveUsername} disabled={lookingUp || !robloxUsername.trim()} style={s.secondaryButton}>
            {lookingUp ? "…" : "resolve"}
          </button>
        </div>
        <input type="text" inputMode="numeric" placeholder="roblox userid (numeric)" value={robloxUserId}
          onChange={e => setRobloxUserId(e.target.value.replace(/[^0-9]/g, ""))} required style={s.input} />
      </div>

      <div style={s.section}>
        <div style={s.sectionLabel}>--action</div>
        <select value={actionType} onChange={e => setActionType(e.target.value)} style={s.input}>
          {ACTION_TYPES.map(a => <option key={a.value} value={a.value}>{a.label}</option>)}
        </select>
        <input type="number" placeholder={selectedAction.field === "delta" ? "amount (use − for subtract)" : "new value"}
          value={amount} onChange={e => setAmount(e.target.value)} required style={s.input} />
        <input type="text" placeholder="reason (optional, shown in audit log)" value={reason} onChange={e => setReason(e.target.value)} style={s.input} />
      </div>

      {result && <div style={result.ok ? s.resultOk : s.resultError}>{result.ok ? "✓" : "✕"} {result.message}</div>}

      <button type="submit" disabled={submitting} style={s.primaryButton}>
        {submitting ? "SENDING…" : selectedAction.verb.toUpperCase() + " →"}
      </button>
    </form>
  );
}

// =========================================================
// Action History — styled as the /var/log tail panel
// =========================================================
const STATUS_STYLES = {
  pending: { color: "var(--gold)", label: "PENDING" },
  broadcast: { color: "var(--gold)", label: "SENT" },
  applied: { color: "var(--success)", label: "APPLIED" },
  failed: { color: "var(--danger)", label: "FAILED" },
};
const ACTION_LABELS = {
  set_credits: "set_credits",
  add_credits: "add_credits",
  set_xp: "set_xp",
  add_xp: "add_xp",
  add_item: "add_item",
  remove_item: "remove_item",
};

function ActionHistory({ refreshSignal, token }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch(LIST_ACTIONS_URL, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const json = await res.json();
      if (!res.ok || json.error) {
        setError(json.error || "Failed to load history.");
      } else {
        setRows(json.actions || []);
        setError(null);
      }
    } catch (err) {
      setError("Network error loading history.");
    }
    setLoading(false);
  }, [token]);

  useEffect(() => { if (token) load(); }, [load, refreshSignal, token]);

  function formatAmount(row) {
    const p = row.payload || {};
    if (p.value !== undefined) return `→ ${p.value}`;
    if (p.delta !== undefined) return `${p.delta > 0 ? "+" : ""}${p.delta}`;
    if (p.itemName !== undefined) return p.itemName;
    return "—";
  }

  return (
    <div style={s.panelBox}>
      <div style={s.panelBar}>
        <span style={s.panelBarPath}>~/log — admin_actions</span>
        <button onClick={load} style={s.tailButton} disabled={loading}>{loading ? "…" : "tail -f"}</button>
      </div>
      <div style={s.panelBody}>
        {error && <div style={s.errorBox}>✕ Couldn't load history: {error}</div>}
        {!error && rows.length === 0 && !loading && <div style={s.empty}>No actions logged yet. Submit one and it appears here.</div>}

        <div style={s.logFeed}>
          {rows.map(row => {
            const status = STATUS_STYLES[row.status] || STATUS_STYLES.pending;
            const time = new Date(row.created_at).toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
            return (
              <div key={row.id} style={s.logLine}>
                <span style={s.logTime}>{time}</span>
                <span style={{ ...s.logStatus, color: status.color }}>{status.label}</span>
                <span style={s.logPlayer}>{row.roblox_username || `uid:${row.roblox_user_id}`}</span>
                <span style={s.logAction}>{ACTION_LABELS[row.action_type] || row.action_type}</span>
                <span style={s.logAmount}>{formatAmount(row)}</span>
                {row.delivery_method && <span style={s.logDelivery}>{row.delivery_method}</span>}
                {row.reason && <span style={s.logReason}>// {row.reason}</span>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// =========================================================
// Personnel Database
// =========================================================
function avatarHeadshotUrl(userId) {
  return `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=420&height=420&format=png`;
}

function formatDuration(totalSeconds) {
  if (totalSeconds === null || totalSeconds === undefined) return "—";
  const sTotal = Math.max(0, Math.floor(totalSeconds));
  const h = Math.floor(sTotal / 3600);
  const m = Math.floor((sTotal % 3600) / 60);
  const sec = sTotal % 60;
  return `${h}h ${m}m ${sec}s`;
}

function formatJoinDate(unixSeconds) {
  if (!unixSeconds) return "unknown";
  const d = new Date(unixSeconds * 1000);
  return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "2-digit" }) +
    " · " + d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
}

function daysAgo(unixSeconds) {
  if (!unixSeconds) return null;
  const diffMs = Date.now() - unixSeconds * 1000;
  const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  if (days <= 0) return "today";
  if (days === 1) return "1 day ago";
  return `${days} days ago`;
}

const INVENTORY_CATEGORIES = [
  { key: "Weapons", label: "weapons" },
  { key: "Medical", label: "medical" },
  { key: "Armor", label: "armor" },
  { key: "Items", label: "items" },
];

// Groups a flat array of item-name strings (one entry per copy held,
// matching how profile.Inventory is actually stored — see InventoryHandler.lua)
// into { name, count } pairs for display.
function groupItemCounts(items) {
  const list = Array.isArray(items) ? items : [];
  const counts = new Map();
  for (const item of list) {
    const name = typeof item === "string" ? item : (item?.name || String(item));
    counts.set(name, (counts.get(name) || 0) + 1);
  }
  return Array.from(counts.entries()).map(([name, count]) => ({ name, count }));
}

// One held-item row: shows name + count on file, a quantity stepper capped
// to what's actually held, and a Remove button. Quantity defaults to 1 so
// a misclick can't nuke a whole stack.
function HeldItemRow({ name, count, category, onRemove, busy }) {
  const [qty, setQty] = useState(1);

  function clampQty(v) {
    const n = Math.floor(Number(v) || 1);
    return Math.max(1, Math.min(count, n));
  }

  return (
    <div style={pd.heldRow}>
      <span style={pd.heldName}>{name}</span>
      <span style={pd.heldCount}>×{count}</span>
      <input
        type="number"
        min={1}
        max={count}
        value={qty}
        onChange={e => setQty(clampQty(e.target.value))}
        style={pd.heldQtyInput}
        disabled={busy}
      />
      <button
        type="button"
        onClick={() => onRemove(name, category, qty)}
        disabled={busy}
        style={pd.heldRemoveBtn}
      >
        {busy ? "…" : "− remove"}
      </button>
    </div>
  );
}

// Add-item picker for one category: item dropdown + quantity + Grant button.
// Only items NOT already held (or held, since re-granting more copies is
// valid) are listed — full catalogue is always offered, since granting a
// second copy of something already held is a normal admin action.
function AddItemRow({ category, onAdd, busy }) {
  const itemsInCategory = ITEM_DATABASE[category] || [];
  const [itemName, setItemName] = useState(itemsInCategory[0] || "");
  const [qty, setQty] = useState(1);

  useEffect(() => {
    setItemName(itemsInCategory[0] || "");
  }, [category]); // eslint-disable-line react-hooks/exhaustive-deps

  if (itemsInCategory.length === 0) {
    return <div style={pd.invEmpty}>no catalogued items in this category</div>;
  }

  return (
    <div style={pd.addRow}>
      <select value={itemName} onChange={e => setItemName(e.target.value)} style={pd.addSelect} disabled={busy}>
        {itemsInCategory.map(name => <option key={name} value={name}>{name}</option>)}
      </select>
      <input
        type="number"
        min={1}
        max={100}
        value={qty}
        onChange={e => setQty(Math.max(1, Math.min(100, Math.floor(Number(e.target.value) || 1))))}
        style={pd.heldQtyInput}
        disabled={busy}
      />
      <button
        type="button"
        onClick={() => onAdd(itemName, category, qty)}
        disabled={busy || !itemName}
        style={pd.addBtn}
      >
        {busy ? "…" : "+ grant"}
      </button>
    </div>
  );
}

function InventoryCategory({ label, category, items, onAdd, onRemove, busyKey }) {
  const [open, setOpen] = useState(true);
  const grouped = groupItemCounts(items);
  const totalCount = grouped.reduce((sum, g) => sum + g.count, 0);

  return (
    <div style={pd.invCategory}>
      <button type="button" onClick={() => setOpen(o => !o)} style={pd.invCategoryHeader}>
        <span style={{ ...pd.invChevron, transform: open ? "rotate(90deg)" : "rotate(0deg)" }}>›</span>
        <span style={pd.invCategoryLabel}>{label}</span>
        <span style={pd.invCategoryCount}>{totalCount}</span>
      </button>
      {open && (
        <div style={pd.invCategoryBody}>
          {grouped.length > 0 ? (
            <div style={pd.heldList}>
              {grouped.map(g => (
                <HeldItemRow
                  key={g.name}
                  name={g.name}
                  count={g.count}
                  category={category}
                  onRemove={onRemove}
                  busy={busyKey === `remove:${g.name}`}
                />
              ))}
            </div>
          ) : (
            <div style={pd.invEmpty}>empty</div>
          )}
          <div style={pd.addRowWrap}>
            <span style={pd.addRowLabel}>grant new</span>
            <AddItemRow category={category} onAdd={onAdd} busy={busyKey === `add:${category}`} />
          </div>
        </div>
      )}
    </div>
  );
}

function PersonnelDatabase({ token, onEditPlayer }) {
  const [query, setQuery] = useState("");
  const [lookingUp, setLookingUp] = useState(false);
  const [error, setError] = useState(null);
  const [profile, setProfile] = useState(null);
  const [resolvedUsername, setResolvedUsername] = useState(null);
  const [invBusyKey, setInvBusyKey] = useState(null); // e.g. "add:Weapons" or "remove:AK-47"
  const [invError, setInvError] = useState(null);

  // Pulled out of handleLookup so a silent refetch after an inventory
  // mutation can reuse it without re-running the username→userId resolve
  // step (we already know the numeric userId by that point).
  async function fetchProfile(userId) {
    const res = await fetch(PROFILE_LOOKUP_URL, {
      method: "POST",
      headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify({ roblox_user_id: Number(userId) }),
    });
    const json = await res.json();
    if (!res.ok || json.error) throw new Error(json.error || "Lookup failed.");
    return json;
  }

  async function handleLookup(e) {
    e.preventDefault();
    setError(null);
    setInvError(null);
    setProfile(null);
    if (!query.trim()) return;

    setLookingUp(true);
    try {
      if (!token) {
        setError("Your session expired — please sign in again.");
        setLookingUp(false);
        return;
      }

      let userId = query.trim();
      let usernameForDisplay = null;

      if (!/^\d+$/.test(userId)) {
        const lookupRes = await fetch(ROBLOX_LOOKUP_URL, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ username: userId }),
        });
        const lookupJson = await lookupRes.json();
        if (!lookupRes.ok || lookupJson.error || !lookupJson.data?.length) {
          setError(lookupJson.error || "No Roblox user found with that username.");
          setLookingUp(false);
          return;
        }
        userId = String(lookupJson.data[0].id);
        usernameForDisplay = lookupJson.data[0].name;
      }

      const json = await fetchProfile(userId);
      setResolvedUsername(usernameForDisplay);
      setProfile(json);
    } catch (err) {
      setError(err.message || "Network error reaching the profile lookup function.");
    } finally {
      setLookingUp(false);
    }
  }

  // Shared submit path for both grant and remove — the only difference is
  // action_type and which busy-key covers the affected row/section so the
  // rest of the dossier stays interactive while one request is in flight.
  async function submitInventoryAction(actionType, itemName, category, quantity, busyKey) {
    if (!token || !profile) return;
    setInvBusyKey(busyKey);
    setInvError(null);
    try {
      const res = await fetch(INVENTORY_ACTION_URL, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          roblox_user_id: profile.roblox_user_id,
          roblox_username: resolvedUsername || null,
          action_type: actionType,
          payload: { itemName, category, quantity },
        }),
      });
      const json = await res.json();
      if (!res.ok || json.error) {
        setInvError(json.error || "Inventory action failed.");
        return;
      }
      // Refetch so the dossier reflects the real post-action state rather
      // than an optimistic local guess — matters here because add/remove
      // apply live in-game (or queue if offline), so the source of truth
      // is the next ProfileStore read, not anything we can compute client-side.
      const refreshed = await fetchProfile(profile.roblox_user_id);
      setProfile(refreshed);
    } catch (err) {
      setInvError("Network error reaching the inventory function.");
    } finally {
      setInvBusyKey(null);
    }
  }

  const handleAddItem = (itemName, category, quantity) =>
    submitInventoryAction("add_item", itemName, category, quantity, `add:${category}`);
  const handleRemoveItem = (itemName, category, quantity) =>
    submitInventoryAction("remove_item", itemName, category, quantity, `remove:${itemName}`);

  return (
    <div style={pd.wrap}>
      <form onSubmit={handleLookup} style={pd.searchRow}>
        <span style={pd.searchPrompt}>$</span>
        <input
          type="text"
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="query --userid or --username"
          style={{ ...s.input, flex: 1 }}
        />
        <button type="submit" disabled={lookingUp || !query.trim()} style={s.primaryButton}>
          {lookingUp ? "QUERYING…" : "RUN →"}
        </button>
      </form>

      {error && <div style={s.errorBox}>✕ {error}</div>}

      {!profile && !error && !lookingUp && (
        <div style={pd.emptyState}>
          <div style={pd.emptyStateIcon}>◈</div>
          <div>Enter a Roblox UserId or username to pull a personnel record.</div>
          <div style={pd.emptyStateSub}>records read live from ProfileStore — works for offline players too</div>
        </div>
      )}

      {profile && (
        <ProfileDossier
          profile={profile}
          username={resolvedUsername}
          onEdit={() => onEditPlayer({ userId: String(profile.roblox_user_id), username: resolvedUsername || "" })}
          onAddItem={handleAddItem}
          onRemoveItem={handleRemoveItem}
          invBusyKey={invBusyKey}
          invError={invError}
        />
      )}
    </div>
  );
}

                </div>

                  <div style={pd.statLabel}>playtime</div>
                  <div style={pd.statValue}>{formatDuration(profile.total_time_seconds)}</div>
                </div>
                <div style={pd.statCell}>
                  <div style={pd.statLabel}>xp / total_xp</div>
                  <div style={pd.statValue}>{profile.xp ?? "—"} / {profile.total_xp ?? "—"}</div>
                </div>
                <div style={pd.statCell}>
                  <div style={pd.statLabel}>skill_points</div>
                  <div style={pd.statValue}>{profile.skill_points ?? "—"}</div>
                </div>
                <div style={pd.statCell}>
                  <div style={pd.statLabel}>bank</div>
                  <div style={pd.statValue}>
                    {profile.bank !== null && profile.bank !== undefined
                      ? Number(profile.bank).toLocaleString() + " ₵"
                      : "—"}
                  </div>
                </div>
                <div style={pd.statCell}>
                  <div style={pd.statLabel}>stock_portfolio</div>
                  <div style={pd.statValue}>
                    {profile.stock_portfolio
                      ? (Array.isArray(profile.stock_portfolio) ? `${profile.stock_portfolio.length} holdings` : "on file")
                      : "—"}
                  </div>
                </div>
              </div>
            </React.Fragment>
          )}
        </div>
      </div>

      {found && (
        <React.Fragment>
          <div style={pd.sectionDivider}># inventory</div>
          {invError && <div style={{ ...s.errorBox, margin: "0 18px 10px" }}>✕ {invError}</div>}
          <div style={pd.inventoryWrap}>
            {INVENTORY_CATEGORIES.map(cat => (
              <InventoryCategory
                key={cat.key}
                label={cat.label}
                category={cat.key}
                items={profile.inventory ? profile.inventory[cat.key] : []}
                onAdd={onAddItem}
                onRemove={onRemoveItem}
                busyKey={invBusyKey}
              />
            ))}
          </div>

          <div style={pd.sectionDivider}># admin_actions.log</div>
          <div style={pd.historyWrap}>
            {(!profile.admin_actions || profile.admin_actions.length === 0) && (
              <div style={pd.invEmpty}>no prior admin actions on file for this player</div>
            )}
            {profile.admin_actions && profile.admin_actions.map(row => {
              const status = STATUS_STYLES[row.status] || STATUS_STYLES.pending;
              const p = row.payload || {};
              const amount = p.value !== undefined ? `→ ${p.value}`
                : (p.delta !== undefined ? `${p.delta > 0 ? "+" : ""}${p.delta}`

                <div key={row.id} style={pd.historyRow}>
                  <span style={{ ...pd.historyDot, background: status.color }}></span>
                  <span style={pd.historyAction}>{ACTION_LABELS[row.action_type] || row.action_type}</span>

                  <span style={pd.historyTime}>{new Date(row.created_at).toLocaleString()}</span>
                  {row.reason && <span style={pd.historyReason}>// {row.reason}</span>}
                </div>
              );

          <div style={pd.dossierFooter}>
            <button type="button" onClick={onEdit} style={s.primaryButton}>edit credits/xp →</button>
          </div>
        </React.Fragment>

  );

function App() {
  const [token, setToken] = useState(() => sessionStorage.getItem("admin_token") || null);
  const [adminInfo, setAdminInfo] = useState(() => {
    const raw = sessionStorage.getItem("admin_info");
    return raw ? JSON.parse(raw) : null;
  });
  const [refreshSignal, setRefreshSignal] = useState(0);
  const [activeTab, setActiveTab] = useState("actions");
  const [prefill, setPrefill] = useState({ userId: "", username: "" });
  const [pendingCount, setPendingCount] = useState(0);
  const [lastSync, setLastSync] = useState("—");

  const handleLoginSuccess = useCallback((newToken, admin) => {
    sessionStorage.setItem("admin_token", newToken);
    sessionStorage.setItem("admin_info", JSON.stringify(admin));
    setToken(newToken);
    setAdminInfo(admin);
  }, []);

  const handleSignOut = useCallback(() => {
    sessionStorage.removeItem("admin_token");
    sessionStorage.removeItem("admin_info");
    setToken(null);
    setAdminInfo(null);
  }, []);

  const handleEditFromProfile = useCallback(({ userId, username }) => {
    setPrefill({ userId, username });
    setActiveTab("actions");
  }, []);

  // Derive pending count + last-sync readout from the same history list
  // used by ActionHistory, fetched independently so the top strip updates
  // even before either tab's panel has mounted.
  useEffect(() => {
    if (!token) return;
    let cancelled = false;
    async function poll() {
      try {
        const res = await fetch(LIST_ACTIONS_URL, { headers: { Authorization: `Bearer ${token}` } });
        const json = await res.json();
        if (cancelled) return;
        if (res.ok && json.actions) {
          const pending = json.actions.filter(r => r.status === "pending" || r.status === "broadcast").length;
          setPendingCount(pending);
        }
        setLastSync(new Date().toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false }));
      } catch (err) { /* silent — top strip is non-critical */ }
    }
    poll();
    const id = setInterval(poll, 15000);
    return () => { cancelled = true; clearInterval(id); };
  }, [token, refreshSignal]);

  if (!token || !adminInfo) return <Login onLoginSuccess={handleLoginSuccess} />;

  return (
    <div style={s.shell}>
      <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} adminInfo={adminInfo} onSignOut={handleSignOut} />

      <div style={s.mainCol}>
        <TopStrip pendingCount={pendingCount} lastSync={lastSync} activeTab={activeTab} />

        {activeTab === "actions" && (
          <main style={s.contentGrid}>
            <div style={s.panelBox}>
              <div style={s.panelBar}>
                <span style={s.panelBarPath}>~/actions — set_credits.sh</span>
                <span style={s.panelBarTag}>form</span>
              </div>
              <div style={s.panelBody}>
                <ActionForm
                  token={token}
                  onActionComplete={() => setRefreshSignal(n => n + 1)}
                  prefillUserId={prefill.userId}
                  prefillUsername={prefill.username}
                />
              </div>
            </div>
            <ActionHistory token={token} refreshSignal={refreshSignal} />
          </main>
        )}

        {activeTab === "personnel" && (
          <main style={{ ...s.contentGrid, gridTemplateColumns: "1fr", maxWidth: 780 }}>
            <PersonnelDatabase token={token} onEditPlayer={handleEditFromProfile} />
          </main>
        )}
      </div>
    </div>
  );
}
